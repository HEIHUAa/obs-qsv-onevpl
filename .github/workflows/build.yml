name: Build OBS QSV oneVPL Plugin

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  PLUGIN_NAME: obs-qsvonevpl

jobs:
  build-windows:
    runs-on: windows-2022
    strategy:
      matrix:
        arch: [x64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'a34c873a9717a888f58dc05268dea15592c2f0ff'
          vcpkgJsonGlob: '**/vcpkg.json'

      - name: Install OBS Studio
        shell: pwsh
        run: |
          $obsVersion = "30.1.2"
          $obsUrl = "https://github.com/obsproject/obs-studio/releases/download/${obsVersion}/OBS-Studio-${obsVersion}-Windows.zip"
          Invoke-WebRequest -Uri $obsUrl -OutFile obs-studio.zip
          Expand-Archive -Path obs-studio.zip -DestinationPath obs-studio
          
          $obsPath = "${{ github.workspace }}/obs-studio/OBS-Studio-${obsVersion}-Windows"
          echo "OBS_PATH=${obsPath}" >> $env:GITHUB_ENV

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build `
            -S . `
            -G "Visual Studio 17 2022" `
            -A ${{ matrix.arch }} `
            -DCMAKE_BUILD_TYPE=RelWithDebInfo `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install" `
            -Dlibobs_DIR="${{ env.OBS_PATH }}/cmake" `
            -DENABLE_HEVC=ON `
            -DBUILD_TESTS=OFF

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config RelWithDebInfo --parallel

      - name: Install
        shell: pwsh
        run: |
          cmake --install build --config RelWithDebInfo

      - name: Prepare package
        shell: pwsh
        run: |
          $packageDir = "${{ github.workspace }}/package"
          New-Item -ItemType Directory -Path $packageDir -Force
          
          Copy-Item -Path "${{ github.workspace }}/install/bin/*${{ env.PLUGIN_NAME }}*.dll" -Destination $packageDir -Force
          Copy-Item -Path "${{ github.workspace }}/install/bin/*${{ env.PLUGIN_NAME }}*.pdb" -Destination $packageDir -Force -ErrorAction SilentlyContinue
          
          if (Test-Path "${{ github.workspace }}/obs-qsvonevpl/data") {
            Copy-Item -Path "${{ github.workspace }}/obs-qsvonevpl/data" -Destination $packageDir -Recurse -Force
          }

      - name: Create artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-windows-${{ matrix.arch }}
          path: ${{ github.workspace }}/package/*
          retention-days: 30

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libobs-dev \
            libva-dev \
            libdrm-dev \
            libwayland-dev \
            libx11-dev \
            libvpl-dev

      - name: Configure CMake
        run: |
          cmake -B build \
            -S . \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install" \
            -DENABLE_HEVC=ON \
            -DBUILD_TESTS=OFF

      - name: Build
        run: |
          cmake --build build --config RelWithDebInfo --parallel

      - name: Install
        run: |
          cmake --install build --config RelWithDebInfo

      - name: Prepare package
        run: |
          mkdir -p package
          cp -v install/lib/*${{ env.PLUGIN_NAME }}*.so package/ || true
          
          if [ -d "obs-qsvonevpl/data" ]; then
            cp -rv obs-qsvonevpl/data package/
          fi

      - name: Create artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-linux-x64
          path: package/*
          retention-days: 30

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-windows-x64
          path: windows-x64

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-linux-x64
          path: linux-x64

      - name: Create release archives
        run: |
          cd windows-x64 && zip -r ../${{ env.PLUGIN_NAME }}-windows-x64.zip . && cd ..
          cd linux-x64 && tar -czvf ../${{ env.PLUGIN_NAME }}-linux-x64.tar.gz . && cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ env.PLUGIN_NAME }}-windows-x64.zip
            ${{ env.PLUGIN_NAME }}-linux-x64.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
