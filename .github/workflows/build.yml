name: Build OBS QSV oneVPL Plugin

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  PLUGIN_NAME: obs-qsvonevpl
  PLUGIN_VERSION: 1.2.0

jobs:
  check-event:
    name: Check Event
    runs-on: ubuntu-latest
    outputs:
      config: ${{ steps.setup.outputs.config }}
      commitHash: ${{ steps.setup.outputs.commitHash }}
    steps:
      - name: Setup Environment
        id: setup
        run: |
          if [[ "${{ startsWith(github.ref, 'refs/tags/') }}" == "true" ]]; then
            echo "config=Release" >> $GITHUB_OUTPUT
          else
            echo "config=RelWithDebInfo" >> $GITHUB_OUTPUT
          fi
          echo "commitHash=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT

  build-windows:
    name: Build for Windows
    runs-on: windows-2022
    needs: check-event
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Download OBS Dependencies
        shell: pwsh
        run: |
          $DepsBase = "https://github.com/obsproject/obs-deps/releases/download"
          $DepsVersion = "2025-08-23"
          
          Write-Host "Downloading Windows deps..."
          Invoke-WebRequest -Uri "${DepsBase}/${DepsVersion}/windows-deps-${DepsVersion}-x64.zip" -OutFile "deps.zip"
          Expand-Archive -Path "deps.zip" -DestinationPath "deps"

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build `
            -S . `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=${{ needs.check-event.outputs.config }} `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install" `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/deps" `
            -DENABLE_HEVC=ON

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config ${{ needs.check-event.outputs.config }} --parallel

      - name: Install
        shell: pwsh
        run: |
          cmake --install build --config ${{ needs.check-event.outputs.config }}

      - name: Prepare package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package -Force
          
          Get-ChildItem -Path install -Recurse -Include "*.dll","*.pdb" | ForEach-Object {
            Copy-Item $_.FullName package -Force
          }
          
          if (Test-Path "obs-qsvonevpl/data") {
            Copy-Item -Path "obs-qsvonevpl/data" -Destination package -Recurse -Force
          }

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-${{ env.PLUGIN_VERSION }}-windows-x64-${{ needs.check-event.outputs.commitHash }}
          path: package/*
          retention-days: 30

  build-linux:
    name: Build for Linux
    runs-on: ubuntu-22.04
    needs: check-event
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libobs-dev \
            libva-dev \
            libdrm-dev \
            libwayland-dev \
            libx11-dev \
            libvpl-dev \
            libpci-dev

      - name: Configure CMake
        run: |
          cmake -B build \
            -S . \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ needs.check-event.outputs.config }} \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install" \
            -DENABLE_HEVC=ON

      - name: Build
        run: |
          cmake --build build --parallel

      - name: Install
        run: |
          cmake --install build

      - name: Prepare package
        run: |
          mkdir -p package
          
          find install -name "*.so" -exec cp -v {} package/ \;
          
          if [ -d "obs-qsvonevpl/data" ]; then
            cp -rv obs-qsvonevpl/data package/
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-${{ env.PLUGIN_VERSION }}-linux-x64-${{ needs.check-event.outputs.commitHash }}
          path: package/*
          retention-days: 30

  release:
    name: Create Release
    needs: [check-event, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-${{ env.PLUGIN_VERSION }}-windows-x64-${{ needs.check-event.outputs.commitHash }}
          path: windows-x64

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}-${{ env.PLUGIN_VERSION }}-linux-x64-${{ needs.check-event.outputs.commitHash }}
          path: linux-x64

      - name: Create release archives
        run: |
          cd windows-x64 && zip -r ../${{ env.PLUGIN_NAME }}-${{ env.PLUGIN_VERSION }}-windows-x64.zip . && cd ..
          cd linux-x64 && tar -czvf ../${{ env.PLUGIN_NAME }}-${{ env.PLUGIN_VERSION }}-linux-x64.tar.gz . && cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ env.PLUGIN_NAME }}-${{ env.PLUGIN_VERSION }}-windows-x64.zip
            ${{ env.PLUGIN_NAME }}-${{ env.PLUGIN_VERSION }}-linux-x64.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
