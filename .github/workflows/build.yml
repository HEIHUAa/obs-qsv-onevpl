name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  BUILD_TYPE: RelWithDebInfo
  VPL_VERSION: v2.12.0
  OBS_VERSION: 31.0.2

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Download OBS Studio dependencies
        run: |
          $obsDepsUrl = "https://github.com/obsproject/obs-deps/releases/download/2025-08-23/windows-deps-2025-08-23-x64.zip"
          New-Item -ItemType Directory -Force -Path deps
          Invoke-WebRequest -Uri $obsDepsUrl -OutFile "obs-deps.zip"
          Expand-Archive -Path "obs-deps.zip" -DestinationPath "deps" -Force

      - name: Set environment variables
        run: |
          Add-Content -Path $env:GITHUB_ENV -Value "OBS_DEPS_DIR=$PWD/deps"
          Add-Content -Path $env:GITHUB_ENV -Value "CMAKE_PREFIX_PATH=$PWD/deps"

      - name: Clone OBS Studio
        run: |
          if (Test-Path obs-studio) { Remove-Item obs-studio -Recurse -Force }
          git clone --depth 1 --branch ${{ env.OBS_VERSION }} https://github.com/obsproject/obs-studio.git obs-studio

      - name: Clone oneVPL
        run: |
          if (Test-Path libvpl) { Remove-Item libvpl -Recurse -Force }
          git clone --depth 1 --branch ${{ env.VPL_VERSION }} https://github.com/oneapi-src/oneVPL.git libvpl

      - name: Configure OBS Studio
        run: |
          cmake -B obs-build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_PREFIX_PATH="${{ env.OBS_DEPS_DIR }}" `
            -DBUILD_TESTS=OFF `
            -DBUILD_BROWSER=OFF `
            -DBUILD_SPARKLE_SUPPORT=OFF `
            -DENABLE_SCRIPTING=OFF `
            -DENABLE_WAYLAND=OFF `
            -DENABLE_X264=ON

      - name: Build OBS Studio
        run: cmake --build obs-build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Configure Plugin
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_PREFIX_PATH="${{ env.OBS_DEPS_DIR }};$PWD/obs-build/libobs/${{ env.BUILD_TYPE }}" `
            -DBUILD_TOOLS=OFF `
            -DBUILD_TESTS=OFF `
            -DBUILD_EXAMPLES=OFF

      - name: Build Plugin
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: obs-qsvonevpl-windows-x64
          path: build/obs-qsvonevpl/${{ env.BUILD_TYPE }}/obs-qsvonevpl.dll
          retention-days: 14

  build-linux:
    name: Linux x64
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libobs-dev libd3d11-dev dxgi-dev libpulse-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build build --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: obs-qsvonevpl-linux-x64
          path: build/obs-qsvonevpl/*.so
          retention-days: 14
