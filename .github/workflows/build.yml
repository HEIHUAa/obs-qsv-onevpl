name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  BUILD_TYPE: RelWithDebInfo
  VPL_VERSION: v2.12.0
  OBS_VERSION: 32.0.4

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Download OBS dependencies
        run: |
          $depsUrl = "https://github.com/obsproject/obs-deps/releases/download/2025-08-23/windows-deps-2025-08-23-x64.zip"
          Invoke-WebRequest -Uri $depsUrl -OutFile obs-deps.zip
          Expand-Archive -Path obs-deps.zip -DestinationPath .deps -Force

      - name: Set OBS deps path
        run: |
          echo "OBS_DEPS_DIR=$PWD/.deps" | Out-File -FilePath $env:GITHUB_ENV -Encoding UTF8 -Append

      - name: Clone oneVPL
        run: |
          git clone --depth 1 --branch ${{ env.VPL_VERSION }} https://github.com/oneapi-src/oneVPL.git libvpl

      - name: Clone OBS Studio
        run: |
          git clone --depth 1 --branch ${{ env.OBS_VERSION }} --recurse-submodules --shallow-submodules https://github.com/obsproject/obs-studio.git obs-src

      - name: Cache OBS Studio build
        id: cache-obs
        uses: actions/cache@v4
        with:
          path: |
            obs-build
            obs-install
          key: obs-${{ env.OBS_VERSION }}-${{ env.BUILD_TYPE }}-${{ hashFiles('obs-src/CMakeLists.txt', 'obs-src/cmake/**/*.cmake') }}
          restore-keys: |
            obs-${{ env.OBS_VERSION }}-${{ env.BUILD_TYPE }}-

      - name: Configure OBS Studio
        run: |
          if (Test-Path obs-build) { Remove-Item -Recurse -Force obs-build }
          cmake -S obs-src -B obs-build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_PREFIX_PATH="$env:OBS_DEPS_DIR" `
            -DBUILD_TESTS=OFF `
            -DBUILD_BROWSER=OFF `
            -DBUILD_SPARKLE_SUPPORT=OFF `
            -DENABLE_SCRIPTING=OFF `
            -DENABLE_WAYLAND=OFF `
            -DENABLE_VLC=OFF `
            -DENABLE_AOM=OFF `
            -DENABLE_SRT=OFF `
            -DENABLE_LIBRIST=OFF `
            -DENABLE_RIST=OFF `
            -DENABLE_X264=OFF `
            -DENABLE_FFMPEG=OFF

      - name: Build OBS Studio
        run: |
          cmake --build obs-build --config ${{ env.BUILD_TYPE }} --parallel 4

      - name: Install OBS Studio to local directory
        run: |
          cmake --install obs-build --config ${{ env.BUILD_TYPE }} --prefix obs-install

      - name: Check obs-build for cmake config
        run: |
          echo "=== Looking for cmake files in obs-build ==="
          Get-ChildItem -Path obs-build -Recurse -Filter "libobs*.cmake" -ErrorAction SilentlyContinue | Select-Object FullName
          Get-ChildItem -Path obs-build -Recurse -Filter "OBS*.cmake" -ErrorAction SilentlyContinue | Select-Object FullName
          echo "=== Looking for cmake config in obs-build/libobs ==="
          if (Test-Path obs-build/libobs) {
            Get-ChildItem -Path obs-build/libobs -Recurse -Filter "*.cmake" -ErrorAction SilentlyContinue | Select-Object FullName
          }
          echo "=== obs-install contents ==="
          Get-ChildItem -Path obs-install -Recurse -Depth 3 -ErrorAction SilentlyContinue | Select-Object FullName

      - name: Configure Plugin
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_PREFIX_PATH="$PWD/obs-build/libobs;$PWD/libvpl" `
            -DBUILD_TOOLS=OFF `
            -DBUILD_TESTS=OFF `
            -DBUILD_EXAMPLES=OFF

      - name: Build Plugin
        run: |
          cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: obs-qsvonevpl-windows-x64
          path: build/obs-qsvonevpl/${{ env.BUILD_TYPE }}/obs-qsvonevpl.dll
          retention-days: 14

  build-linux:
    name: Linux x64
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libobs-dev libd3d11-dev dxgi-dev libpulse-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build build --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: obs-qsvonevpl-linux-x64
          path: build/obs-qsvonevpl/*.so
          retention-days: 14
