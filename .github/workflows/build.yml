name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  BUILD_TYPE: RelWithDebInfo
  VPL_VERSION: v2.12.0
  OBS_VERSION: 31.0.2

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Download OBS dependencies
        run: |
          $depsUrl = "https://obsproject.com/downloads/dependencies2022-x64.zip"
          Invoke-WebRequest -Uri $depsUrl -OutFile obs-deps.zip
          Expand-Archive -Path obs-deps.zip -DestinationPath .deps -Force

      - name: Set OBS deps path
        run: |
          echo "OBS_DEPS_DIR=$PWD/.deps" | Out-File -FilePath $env:GITHUB_ENV -Encoding UTF8 -Append
          echo "CMAKE_PREFIX_PATH=$PWD/.deps" | Out-File -FilePath $env:GITHUB_ENV -Encoding UTF8 -Append

      - name: Clone OBS Studio
        run: |
          git clone --depth 1 --branch ${{ env.OBS_VERSION }} https://github.com/obsproject/obs-studio.git obs-src

      - name: Configure OBS Studio
        run: |
          cmake -B obs-build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_PREFIX_PATH="$env:OBS_DEPS_DIR" `
            -DBUILD_TESTS=OFF `
            -DBUILD_BROWSER=OFF `
            -DBUILD_SPARKLE_SUPPORT=OFF `
            -DENABLE_SCRIPTING=OFF `
            -DENABLE_WAYLAND=OFF `
            -DENABLE_VLC=OFF `
            -DENABLE_AOM=OFF `
            -DENABLE_SRT=OFF `
            -DENABLE_LIBRIST=OFF `
            -DENABLE_RIST=OFF `
            -DENABLE_X264=OFF `
            -DENABLE_FFMPEG=OFF

      - name: Build OBS Studio libobs
        run: |
          cmake --build obs-build --config ${{ env.BUILD_TYPE }} --target libobs --parallel

      - name: Clone oneVPL
        run: |
          git clone --depth 1 --branch ${{ env.VPL_VERSION }} https://github.com/oneapi-src/oneVPL.git libvpl

      - name: Configure Plugin
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_PREFIX_PATH="$env:OBS_DEPS_DIR;$PWD/obs-build/libobs/${{ env.BUILD_TYPE }}" `
            -DBUILD_TOOLS=OFF `
            -DBUILD_TESTS=OFF `
            -DBUILD_EXAMPLES=OFF

      - name: Build Plugin
        run: |
          cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: obs-qsvonevpl-windows-x64
          path: build/obs-qsvonevpl/${{ env.BUILD_TYPE }}/obs-qsvonevpl.dll
          retention-days: 14

  build-linux:
    name: Linux x64
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libobs-dev libd3d11-dev dxgi-dev libpulse-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build build --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: obs-qsvonevpl-linux-x64
          path: build/obs-qsvonevpl/*.so
          retention-days: 14
